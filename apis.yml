    name: University of Copenhagen Research Portal (CURIS / Pure)
    description: >-
      The University of Copenhagen Research Portal (researchprofiles.ku.dk) is
      built on the Elsevier Pure research information system, locally branded
      CURIS. Pure platforms conventionally expose research metadata via an
      OAI-PMH interface and the Pure web service (REST). The public portal was
      reachable but its programmatic endpoints returned access-restricted
      responses from the public internet at review time, so no working public
      base URL is asserted here.
