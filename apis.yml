---
aid: university-of-copenhagen
name: University of Copenhagen
description: >-
  The University of Copenhagen (Københavns Universitet, UCPH), founded in 1479,
  is Denmark's oldest and largest university and one of the leading research
  institutions in the Nordic region, ranked #53 in the QS World University
  Rankings 2025. It has no centralized public developer portal or documented
  open-data API program. Its public technical footprint consists of the
  ku-kom GitHub organization (TYPO3 CMS extensions and front-end styleguide used
  to build the ku.dk web platform) and the CURIS research information system on
  researchprofiles.ku.dk, an Elsevier Pure platform that conventionally supports
  OAI-PMH metadata harvesting and the Pure web service though these endpoints
  could not be confirmed reachable from the public internet at review time.
