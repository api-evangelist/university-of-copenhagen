  - date: '2026-06-03'
    rating: 2
    summary: >-
      University of Copenhagen has no centralized public developer portal or
      documented open-data API program. Verified live: the ku-kom GitHub
      organization (named "University of Copenhagen", 52 public repos, mostly
      TYPO3 CMS extensions and a Bootstrap styleguide), the official website
      ku.dk, the kurser.ku.dk course catalogue, and the official LinkedIn school
      page. The researchprofiles.ku.dk Pure/CURIS research portal exists but its
      programmatic OAI-PMH and Pure web service endpoints returned
      access-restricted responses from the public internet, so no live public
      API endpoint was confirmed. No endpoints were fabricated; only
      access-restricted or undocumented interfaces are noted as such.
    endpoints:
